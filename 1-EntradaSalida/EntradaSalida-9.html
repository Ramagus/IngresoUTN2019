<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Curso De Ingreso UTN FRA</title>

		<!--Estilos-->

		<script type="text/javascript" src="jsEntradaSalida-9.js"></script>

	<body>
		<div class="CajaUno animated bounceInDown">
			<h1>Ingrese El Sueldo </h1>
			<form id="FormIngreso">

				<input type="text"  placeholder="Ingrese Sueldo" id="sueldo">

				<input type="text" readonly  placeholder="Resultado" id="resultado">
				
			</form>
			
		</div>


		<div class="CajaUno animated bounceInLeft">	
			
			<button  class="MiBotonUTN" onclick="mostrarAumento()" >Mostrar Aumento</button>

			<h2>Enunciado:</h2>
			
				<h3>
					Debemos lograr tomar el sueldo por ID,
					transformarlo a entero (parseInt) y luego,
					mostrar el nuevo sueldo con un aumento del 10%, en el cuadro de texto "RESULTADO"
				</h3>
			
			
		</div>

		<div class="CajaAbajo animated bounceInUp">
			<a  class="MiBotonUTNLinea" onclick="location.href='index.html'" >Men&uacute; Ejercicios</a>
